<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eating Out Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 140, 0.6), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 140, 60, 0.4), transparent 35%),
        linear-gradient(180deg, #fff7ef 0%, #ffe9d6 100%);
      overflow-x: hidden;
      color: #2f241d;
      position: relative;
    }

    .page-wrap {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    /* FLOATING BACKGROUND EMOJIS */
    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .background span {
      position: absolute;
      bottom: -120px;
      font-size: 2.2rem;
      opacity: 0.16;
      animation: floatUp linear infinite;
      filter: blur(0.2px);
      will-change: transform, opacity;
    }

    .background span:nth-child(1) { left: 5%;  animation-duration: 18s; animation-delay: 0s; }
    .background span:nth-child(2) { left: 18%; animation-duration: 22s; animation-delay: 2s; }
    .background span:nth-child(3) { left: 31%; animation-duration: 20s; animation-delay: 1s; }
    .background span:nth-child(4) { left: 45%; animation-duration: 24s; animation-delay: 4s; }
    .background span:nth-child(5) { left: 59%; animation-duration: 21s; animation-delay: 2.5s; }
    .background span:nth-child(6) { left: 74%; animation-duration: 25s; animation-delay: 1.5s; }
    .background span:nth-child(7) { left: 88%; animation-duration: 19s; animation-delay: 3s; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 0.16;
      }
      75% {
        opacity: 0.16;
      }
      100% {
        transform: translateY(-125vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* GLOW BLOBS */
    .glow,
    .glow2 {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
    }

    .glow {
      background: #ff9a3c;
      top: 10%;
      left: 10%;
    }

    .glow2 {
      background: #ff5c2e;
      bottom: 10%;
      right: 10%;
    }

    /* MAIN CARD */
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      position: relative;
      z-index: 3;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.15;
    }

    p {
      color: #555;
      margin: 15px 0 25px;
      line-height: 1.45;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
      background: rgba(255,255,255,0.92);
    }

    input:focus {
      outline: none;
      border-color: #ea580c;
      box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ea580c, #c2410c);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      opacity: 0.95;
    }

    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 15px;
      background: #fff3e8;
      border: 1px solid rgba(234, 88, 12, 0.12);
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      color: #b94814;
    }

    .subtext {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      line-height: 1.45;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }

    /* MOBILE - keep the look you already like */
    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }

      .background span {
        font-size: 1.8rem;
      }
    }

    /* DESKTOP ONLY UPGRADES */
    @media (min-width: 1024px) {
      body {
        background:
          radial-gradient(circle at 12% 18%, rgba(255, 210, 140, 0.82), transparent 24%),
          radial-gradient(circle at 85% 78%, rgba(255, 151, 85, 0.55), transparent 28%),
          radial-gradient(circle at 50% 50%, rgba(255, 239, 224, 0.7), transparent 42%),
          linear-gradient(135deg, #fff5eb 0%, #ffecd9 48%, #fff8f2 100%);
      }

      .page-wrap {
        padding: 48px;
      }

      .card {
        max-width: 620px;
        padding: 42px 34px 34px;
        border-radius: 30px;
        box-shadow:
          0 28px 80px rgba(120, 72, 25, 0.14),
          0 12px 36px rgba(120, 72, 25, 0.08);
      }

      h1 {
        font-size: 3rem;
        line-height: 1.04;
        letter-spacing: -0.04em;
        max-width: 520px;
        margin: 0 auto;
      }

      p {
        font-size: 1.16rem;
        max-width: 500px;
        margin: 18px auto 28px;
        color: #6a5648;
      }

      input {
        padding: 18px 20px;
        font-size: 18px;
        border-radius: 16px;
        margin-bottom: 18px;
      }

      button {
        padding: 18px 20px;
        font-size: 18px;
        border-radius: 16px;
      }

      button:hover {
        transform: translateY(-2px) scale(1.01);
        box-shadow: 0 16px 36px rgba(234, 88, 12, 0.28);
      }

      .result-box {
        margin-top: 26px;
        padding: 26px 24px;
        border-radius: 20px;
        background: linear-gradient(180deg, #fff4ea 0%, #ffeedf 100%);
      }

      .result {
        font-size: 2.2rem;
      }

      .subtext {
        font-size: 1rem;
      }

      .footer {
        margin-top: 24px;
        font-size: 13px;
      }

      .background span {
        font-size: 3rem;
        opacity: 0.24;
      }

      .background span:nth-child(1) { left: 6%;  animation-duration: 24s; }
      .background span:nth-child(2) { left: 17%; animation-duration: 28s; }
      .background span:nth-child(3) { left: 29%; animation-duration: 26s; }
      .background span:nth-child(4) { left: 43%; animation-duration: 31s; }
      .background span:nth-child(5) { left: 58%; animation-duration: 27s; }
      .background span:nth-child(6) { left: 74%; animation-duration: 32s; }
      .background span:nth-child(7) { left: 89%; animation-duration: 25s; }

      .glow,
      .glow2 {
        width: 460px;
        height: 460px;
        filter: blur(155px);
        opacity: 0.4;
      }

      .glow {
        top: 2%;
        left: 2%;
      }

      .glow2 {
        bottom: 2%;
        right: 4%;
      }
    }
  </style>
</head>

<body>

  <div class="background">
    <span>🍔</span>
    <span>💸</span>
    <span>🍟</span>
    <span>🥤</span>
    <span>💳</span>
    <span>🍕</span>
    <span>🧾</span>
  </div>

  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="page-wrap">
    <div class="card">
      <h1>How Much Do You Spend Eating Out? 🍔</h1>
      <p>Put in your average weekly spending on takeout, fast food, restaurants, or snack runs. The yearly number might slap a little.</p>

      <input type="number" id="money" placeholder="$ per week on food">

      <button onclick="calculate()">Show me the damage</button>

      <div class="result-box">
        <div class="result" id="result">Your total will show here</div>
        <div class="subtext" id="subtext"></div>
      </div>

      <div class="footer">ToolGarden • tiny tools, big realizations</div>
    </div>
  </div>

  <script>
    function calculate() {
      const money = Number(document.getElementById("money").value);
      const result = document.getElementById("result");
      const subtext = document.getElementById("subtext");

      if (!money || money < 0) {
        result.innerText = "Enter a real number 👀";
        subtext.innerText = "";
        return;
      }

      const yearly = money * 52;
      const fiveYear = yearly * 5;

      result.innerText = `$${yearly.toLocaleString()} per year 😳`;

      if (yearly < 1000) {
        subtext.innerText = "Not too bad… but it adds up.";
      } else if (yearly < 3000) {
        subtext.innerText = "That’s a vacation right there 😬";
      } else if (yearly < 6000) {
        subtext.innerText = "Yeah… this is why saving feels hard.";
      } else {
        subtext.innerText = `In 5 years, that's $${fiveYear.toLocaleString()} 💀`;
      }
    }
  </script>

</body>
</html>

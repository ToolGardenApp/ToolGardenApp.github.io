<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This Website Exposed Me</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f6f8ff 0%, #eef2ff 100%);
      color: #1f2937;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      font-size: 1rem;
      color: #4b5563;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
      margin-bottom: 16px;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    button {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .result {
      margin-top: 24px;
      font-size: 1.4rem;
      font-weight: bold;
      min-height: 40px;
    }

    .subtext {
      margin-top: 10px;
      font-size: 0.95rem;
      color: #6b7280;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.85rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>This Website Exposed Me 😭</h1>
    <p>Type how much you spend each week and see what it adds up to in a year.</p>

    <input type="number" id="money" placeholder="Enter $ per week" />
    <button onclick="calculate()">Check the damage</button>

    <div class="result" id="result"></div>
    <div class="subtext" id="subtext"></div>

    <div class="footer-note">Tiny tools. Big wake-up calls.</div>
  </div>

  <script>
    function calculate() {
      const money = Number(document.getElementById("money").value);
      const result = document.getElementById("result");
      const subtext = document.getElementById("subtext");

      if (!money || money < 0) {
        result.innerText = "Enter a real number first 👀";
        subtext.innerText = "";
        return;
      }

      const yearly = money * 52;
      result.innerText = `That's $${yearly.toLocaleString()} per year 😳`;

      if (yearly < 500) {
        subtext.innerText = "Not terrible... but that still buys a lot more than you think.";
      } else if (yearly < 2000) {
        subtext.innerText = "That number has some bite.";
      } else if (yearly < 5000) {
        subtext.innerText = "Yeah... that adds up fast.";
      } else {
        subtext.innerText = "That is a whole side-quest worth of money.";
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eating Out Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff7ed, #ffedd5);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    p {
      color: #555;
      margin: 15px 0 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #ea580c;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
    }

    .subtext {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>How Much Do You Spend Eating Out? 🍔</h1>
    <p>Be honest… this might hurt 😭</p>

    <input type="number" id="money" placeholder="$ per week on food">

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
    <div class="subtext" id="subtext"></div>

    <div class="footer">ToolGarden • tiny tools, big realizations</div>
  </div>

  <script>
    function calculate() {
      const money = Number(document.getElementById("money").value);
      const result = document.getElementById("result");
      const subtext = document.getElementById("subtext");

      if (!money || money < 0) {
        result.innerText = "Enter a real number 👀";
        subtext.innerText = "";
        return;
      }

      const yearly = money * 52;
      const fiveYear = yearly * 5;

      result.innerText = `$${yearly.toLocaleString()} per year 😳`;

      if (yearly < 1000) {
        subtext.innerText = "Okay… not too bad. Still adds up though.";
      } else if (yearly < 3000) {
        subtext.innerText = "That’s a vacation right there 😬";
      } else if (yearly < 6000) {
        subtext.innerText = "Yeah… this is why saving feels hard.";
      } else {
        subtext.innerText = "You could buy a whole car with 5 years of this 💀";
      }
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eating Out Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      color: #2f241d;
      overflow-x: hidden;
      position: relative;
      background:
        radial-gradient(circle at top left, rgba(255, 197, 109, 0.52), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255, 130, 64, 0.34), transparent 32%),
        linear-gradient(180deg, #f2dcc4 0%, #e3c3a8 100%);
    }

    .page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .background span {
      position: absolute;
      bottom: -140px;
      font-size: 2.5rem;
      opacity: 0.30;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.3; }
      100% { transform: translateY(-120vh); opacity: 0; }
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, rgba(255,243,228,0.98), rgba(252,232,212,0.96));
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(83,49,18,0.15);
      border: 2px solid rgba(234,88,12,0.26);
      z-index: 3;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .subtitle {
      margin: 15px 0 25px;
      color: #6a5648;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(214,132,74,0.34);
      margin-bottom: 15px;
    }

    /* ✅ FIXED BUTTON (NO WEIRD BUBBLE) */
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #f15a08, #ca430d);
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(234, 88, 12, 0.22);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(234, 88, 12, 0.28);
    }

    .result-box {
      margin-top: 20px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(145deg, #fff8f3, #ffd7bf);
      border: 2px solid rgba(234, 88, 12, 0.30);
      box-shadow: 0 16px 30px rgba(179,88,29,0.12);
    }

    .result {
      font-size: 22px;
      font-weight: bold;
      color: #b94814;
    }

    .subtext {
      margin-top: 10px;
      font-size: 14px;
      color: #665f59;
    }
  </style>
</head>

<body>

  <div class="page-wrap">
    <div class="card">

      <h1>How Much Do You Spend Eating Out?</h1>

      <p class="subtitle">
        Put in your weekly spending. The yearly number might slap.
      </p>

      <input type="number" id="money" placeholder="Enter $ per week" />

      <button onclick="calculate()">Show me the damage</button>

      <div class="result-box">
        <div class="result" id="result">Your total will show here</div>
        <div class="subtext" id="subtext">Tiny bites → big money monster.</div>
      </div>

    </div>
  </div>

  <script>
    function calculate() {
      const money = Number(document.getElementById("money").value);
      const yearly = money * 52;

      document.getElementById("result").innerText =
        "$" + yearly.toLocaleString() + " per year 😳";

      document.getElementById("subtext").innerText =
        "Yeah... it adds up fast.";
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eating Out Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 210, 140, 0.6), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 140, 60, 0.4), transparent 35%),
        linear-gradient(180deg, #fff7ef 0%, #ffe9d6 100%);
      overflow-x: hidden;
      color: #2f241d;
    }

    .page-wrap {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 2;
    }

    /* FLOATING BACKGROUND EMOJIS */
    .background {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .background span {
      position: absolute;
      bottom: -80px;
      font-size: 2.2rem;
      opacity: 0.12;
      animation: floatUp linear infinite;
    }

    .background span:nth-child(1) { left: 5%; animation-duration: 10s; }
    .background span:nth-child(2) { left: 20%; animation-duration: 14s; }
    .background span:nth-child(3) { left: 35%; animation-duration: 12s; }
    .background span:nth-child(4) { left: 50%; animation-duration: 15s; }
    .background span:nth-child(5) { left: 65%; animation-duration: 13s; }
    .background span:nth-child(6) { left: 80%; animation-duration: 16s; }
    .background span:nth-child(7) { left: 90%; animation-duration: 11s; }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.12; }
      100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
    }

    /* GLOW BLOBS */
    .glow, .glow2 {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      z-index: 0;
    }

    .glow {
      background: #ff9a3c;
      top: 10%;
      left: 10%;
    }

    .glow2 {
      background: #ff5c2e;
      bottom: 10%;
      right: 10%;
    }

    /* MAIN CARD */
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    p {
      color: #555;
      margin: 15px 0 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-bottom: 15px;
    }

    input:focus {
      outline: none;
      border-color: #ea580c;
      box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ea580c, #c2410c);
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .result-box {
      margin-top: 20px;
      padding: 18px;
      border-radius: 15px;
      background: #fff3e8;
    }

    .result {
      font-size: 22px;
      font-weight: bold;
    }

    .subtext {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
    }

    /* MOBILE FIXES */
    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }

      .background span {
        font-size: 1.8rem;
      }
    }

  </style>
</head>

<body>

  <!-- BACKGROUND EMOJIS -->
  <div class="background">
    <span>🍔</span>
    <span>💸</span>
    <span>🍟</span>
    <span>🥤</span>
    <span>💳</span>
    <span>🍕</span>
    <span>🧾</span>
  </div>

  <!-- GLOW EFFECT -->
  <div class="glow"></div>
  <div class="glow2"></div>

  <!-- CENTER WRAPPER -->
  <div class="page-wrap">

    <div class="card">
      <h1>How Much Do You Spend Eating Out? 🍔</h1>
      <p>This might hurt a little 😭</p>

      <input type="number" id="money" placeholder="$ per week on food">

      <button onclick="calculate()">Calculate</button>

      <div class="result-box">
        <div class="result" id="result">Your total will show here</div>
        <div class="subtext" id="subtext"></div>
      </div>

      <div class="footer">ToolGarden • tiny tools, big realizations</div>
    </div>

  </div>

  <script>
    function calculate() {
      const money = Number(document.getElementById("money").value);
      const result = document.getElementById("result");
      const subtext = document.getElementById("subtext");

      if (!money || money < 0) {
        result.innerText = "Enter a real number 👀";
        subtext.innerText = "";
        return;
      }

      const yearly = money * 52;
      const fiveYear = yearly * 5;

      result.innerText = `$${yearly.toLocaleString()} per year 😳`;

      if (yearly < 1000) {
        subtext.innerText = "Not too bad… but it adds up.";
      } else if (yearly < 3000) {
        subtext.innerText = "That’s a vacation right there 😬";
      } else if (yearly < 6000) {
        subtext.innerText = "Yeah… this is why saving feels hard.";
      } else {
        subtext.innerText = `In 5 years, that's $${fiveYear.toLocaleString()} 💀`;
      }
    }
  </script>

</body>
</html>
